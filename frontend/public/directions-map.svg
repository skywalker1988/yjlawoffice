<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 540" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif">
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-color="#00000015"/>
    </filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c8a97e"/>
    </marker>
  </defs>

  <rect width="840" height="540" fill="#f5f3ef" rx="8"/>

  <!-- 타이틀 -->
  <rect x="0" y="0" width="840" height="46" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="34" width="840" height="16" fill="#1a1a2e"/>
  <text x="420" y="30" text-anchor="middle" fill="#c8a97e" font-size="13" font-weight="500" letter-spacing="3">오시는 길 — 교대역 4번 출구 도보 약 3분</text>

  <!-- ============================================================ -->
  <!-- 도로                                                          -->
  <!-- ============================================================ -->

  <!-- 서초대로 (동서 대로) — 지도의 중앙 가로 도로 -->
  <rect x="20" y="260" width="800" height="44" fill="#e5e2db" rx="2"/>
  <line x1="20" y1="282" x2="820" y2="282" stroke="#d6d2ca" stroke-width="1.2" stroke-dasharray="14,8"/>
  <text x="420" y="286" text-anchor="middle" fill="#bbb" font-size="9" letter-spacing="6">서 초 대 로</text>
  <text x="40" y="278" fill="#d0ccc5" font-size="7">← 방배·이수</text>
  <text x="755" y="278" fill="#d0ccc5" font-size="7">서초역 →</text>

  <!-- 법원로 / 3호선 (남북) — 교대역 서쪽을 지나는 남북 도로 -->
  <rect x="155" y="55" width="32" height="440" fill="#eae7e1" rx="2"/>

  <!-- 2호선 노선 표시 (서초대로 아래, 연한 초록) -->
  <line x1="20" y1="304" x2="820" y2="304" stroke="#4CAF50" stroke-width="3" opacity="0.12"/>

  <!-- 3호선 노선 표시 (법원로 아래, 연한 주황) -->
  <line x1="171" y1="55" x2="171" y2="495" stroke="#EF6C00" stroke-width="3" opacity="0.12"/>

  <!-- 서초중앙로28길 (법원로 왼쪽 골목) -->
  <rect x="75" y="60" width="18" height="195" fill="#edebe6" rx="1"/>

  <!-- 서초대로52길 (교대역 남쪽 작은 동서 도로) -->
  <rect x="230" y="390" width="350" height="14" fill="#edebe6" rx="1"/>
  <text x="405" y="400" text-anchor="middle" fill="#d5d0c9" font-size="6" letter-spacing="1">서초대로52길</text>

  <!-- ============================================================ -->
  <!-- 건물 블록 (지도 기반 배치)                                      -->
  <!-- ============================================================ -->

  <!-- ── 서초대로 북쪽 (위) ── -->

  <!-- 서울법원청사 / 서울중앙지방법원 (북서쪽, 큰 블록) -->
  <rect x="25" y="70" width="120" height="80" fill="#ddd9d2" rx="4" filter="url(#sh)"/>
  <text x="85" y="107" text-anchor="middle" fill="#b8b3ab" font-size="8">서울중앙</text>
  <text x="85" y="119" text-anchor="middle" fill="#b8b3ab" font-size="8">지방법원</text>

  <!-- 블루원빌딩 -->
  <rect x="200" y="130" width="65" height="45" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="232" y="157" text-anchor="middle" fill="#c5c0b8" font-size="7">블루원빌딩</text>

  <!-- 우민빌딩 -->
  <rect x="120" y="180" width="50" height="35" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="145" y="201" text-anchor="middle" fill="#c5c0b8" font-size="7">우민빌딩</text>

  <!-- 사운즈커피 법원교대역점 -->
  <rect x="280" y="165" width="80" height="40" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="320" y="186" text-anchor="middle" fill="#c5c0b8" font-size="7">사운즈커피</text>
  <text x="320" y="197" text-anchor="middle" fill="#d0ccc5" font-size="6">법원교대역점</text>

  <!-- 노브랜드 -->
  <rect x="430" y="195" width="55" height="35" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="457" y="216" text-anchor="middle" fill="#c5c0b8" font-size="7">노브랜드</text>

  <!-- 삼풍프라자 -->
  <rect x="500" y="210" width="60" height="42" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="530" y="235" text-anchor="middle" fill="#c5c0b8" font-size="7">삼풍프라자</text>

  <!-- ★★★ 윤정 법률사무소 ★★★ -->
  <g>
    <rect x="600" y="206" width="110" height="48" fill="#1a1a2e" rx="5" filter="url(#sh)"/>
    <rect x="608" y="216" width="4" height="14" fill="#c8a97e" rx="1"/>
    <rect x="615" y="212" width="4" height="18" fill="#c8a97e" rx="1"/>
    <rect x="622" y="218" width="4" height="12" fill="#c8a97e" rx="1"/>
    <text x="672" y="228" text-anchor="middle" fill="#c8a97e" font-size="10" font-weight="600">윤정 법률사무소</text>
    <text x="672" y="244" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7">서초대로 327 · 로뎀빌딩 5F</text>
  </g>

  <!-- 베스킨라빈스 -->
  <rect x="720" y="215" width="40" height="30" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="740" y="234" text-anchor="middle" fill="#c5c0b8" font-size="6">베스킨라빈스</text>

  <!-- 우리은행 -->
  <rect x="766" y="215" width="45" height="30" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="788" y="234" text-anchor="middle" fill="#c5c0b8" font-size="7">우리은행</text>

  <!-- ── 서초대로 남쪽 (아래) ── -->

  <!-- CU (교대역 서쪽) -->
  <rect x="145" y="310" width="30" height="25" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="160" y="326" text-anchor="middle" fill="#c5c0b8" font-size="7">CU</text>

  <!-- 진화력 -->
  <rect x="200" y="330" width="50" height="30" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="225" y="349" text-anchor="middle" fill="#c5c0b8" font-size="7">진화력</text>

  <!-- 파리바게뜨 -->
  <rect x="270" y="330" width="55" height="28" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="297" y="348" text-anchor="middle" fill="#c5c0b8" font-size="7">파리바게뜨</text>

  <!-- 하나은행 -->
  <rect x="340" y="315" width="45" height="28" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="362" y="333" text-anchor="middle" fill="#c5c0b8" font-size="7">하나은행</text>

  <!-- 올리브영 -->
  <rect x="450" y="310" width="50" height="28" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="475" y="328" text-anchor="middle" fill="#c5c0b8" font-size="7">올리브영</text>

  <!-- 삼성스토어 -->
  <rect x="530" y="310" width="55" height="28" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="557" y="328" text-anchor="middle" fill="#c5c0b8" font-size="7">삼성스토어</text>

  <!-- 미우미우 -->
  <rect x="640" y="310" width="45" height="28" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="662" y="328" text-anchor="middle" fill="#c5c0b8" font-size="7">미우미우</text>

  <!-- 서관연육 교대본점 -->
  <rect x="700" y="320" width="60" height="28" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="730" y="338" text-anchor="middle" fill="#c5c0b8" font-size="6">서관연육 교대본점</text>

  <!-- 더 남쪽: 로이어즈타워, 교대역(3호선) -->
  <rect x="160" y="415" width="55" height="30" fill="#ddd9d2" rx="3" filter="url(#sh)"/>
  <text x="187" y="434" text-anchor="middle" fill="#c5c0b8" font-size="6">로이어즈타워</text>

  <!-- ============================================================ -->
  <!-- 교대역 — 서초대로 남쪽, 2·3호선 교차 지점                        -->
  <!-- ============================================================ -->

  <!-- 역 라벨 -->
  <text x="330" y="370" text-anchor="middle" fill="#999" font-size="11" font-weight="500">교대역</text>
  <text x="330" y="384" text-anchor="middle" fill="#bbb" font-size="7">2호선 · 3호선</text>

  <!-- 출구들 (지도 참고: 1~3번은 서초대로 바로 아래 북쪽, 동쪽부터) -->
  <!-- 1번: 서초대로 남쪽, 가장 동쪽 -->
  <circle cx="470" cy="310" r="7" fill="#4CAF50" opacity="0.6"/>
  <text x="470" y="314" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">1</text>

  <!-- 2번 -->
  <circle cx="420" cy="310" r="7" fill="#4CAF50" opacity="0.6"/>
  <text x="420" y="314" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">2</text>

  <!-- 3번 -->
  <circle cx="370" cy="310" r="7" fill="#4CAF50" opacity="0.6"/>
  <text x="370" y="314" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">3</text>

  <!-- ★ 4번 출구 — 서초대로 바로 아래, 3번 왼쪽 -->
  <g>
    <circle cx="330" cy="308" r="10" fill="#c8a97e" filter="url(#sh)"/>
    <text x="330" y="312" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">4</text>
  </g>

  <!-- 5번 -->
  <circle cx="350" cy="360" r="7" fill="#4CAF50" opacity="0.5"/>
  <text x="350" y="364" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">5</text>

  <!-- 6번 -->
  <circle cx="275" cy="345" r="7" fill="#4CAF50" opacity="0.5"/>
  <text x="275" y="349" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">6</text>

  <!-- 7번 -->
  <circle cx="310" cy="345" r="7" fill="#4CAF50" opacity="0.5"/>
  <text x="310" y="349" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">7</text>

  <!-- 8번 (남쪽, 3호선 방향) -->
  <circle cx="195" cy="400" r="7" fill="#EF6C00" opacity="0.5"/>
  <text x="195" y="404" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">8</text>

  <!-- 10~11번 -->
  <circle cx="175" cy="370" r="7" fill="#EF6C00" opacity="0.5"/>
  <text x="175" y="374" text-anchor="middle" fill="#fff" font-size="6" font-weight="600">10</text>

  <circle cx="200" cy="370" r="7" fill="#EF6C00" opacity="0.5"/>
  <text x="200" y="374" text-anchor="middle" fill="#fff" font-size="6" font-weight="600">11</text>

  <!-- 12번 -->
  <circle cx="230" cy="400" r="7" fill="#EF6C00" opacity="0.5"/>
  <text x="230" y="404" text-anchor="middle" fill="#fff" font-size="6" font-weight="600">12</text>

  <!-- 13~14번 (남쪽 끝) -->
  <circle cx="220" cy="445" r="7" fill="#EF6C00" opacity="0.5"/>
  <text x="220" y="449" text-anchor="middle" fill="#fff" font-size="6" font-weight="600">13</text>

  <circle cx="250" cy="445" r="7" fill="#EF6C00" opacity="0.5"/>
  <text x="250" y="449" text-anchor="middle" fill="#fff" font-size="6" font-weight="600">14</text>

  <!-- ============================================================ -->
  <!-- 도보 경로: 4번 출구 → 윤정 법률사무소                            -->
  <!-- 4번에서 북쪽(서초대로)으로 나와 동쪽으로 직진                      -->
  <!-- ============================================================ -->
  <path
    d="M 330 298 L 330 275 L 598 275"
    fill="none"
    stroke="#c8a97e"
    stroke-width="4"
    stroke-dasharray="10,6"
    stroke-linecap="round"
    stroke-linejoin="round"
    marker-end="url(#ag)"
    opacity="0.9"
  />

  <!-- 경로 라벨 -->
  <rect x="425" y="255" width="80" height="20" fill="#c8a97e" rx="10"/>
  <text x="465" y="269" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">도보 약 3분</text>

  <!-- ============================================================ -->
  <!-- 범례                                                          -->
  <!-- ============================================================ -->
  <g transform="translate(40, 485)">
    <rect width="760" height="40" fill="#fff" rx="5" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

    <circle cx="20" cy="20" r="5" fill="#4CAF50" opacity="0.6"/>
    <text x="32" y="24" fill="#888" font-size="8">2호선 출구</text>

    <circle cx="105" cy="20" r="5" fill="#EF6C00" opacity="0.5"/>
    <text x="117" y="24" fill="#888" font-size="8">3호선 출구</text>

    <circle cx="195" cy="20" r="7" fill="#c8a97e"/>
    <text x="195" y="23" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">4</text>
    <text x="210" y="24" fill="#888" font-size="8">추천 출구</text>

    <line x1="280" y1="20" x2="315" y2="20" stroke="#c8a97e" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="325" y="24" fill="#888" font-size="8">도보 경로</text>

    <rect x="400" y="13" width="12" height="12" fill="#1a1a2e" rx="2"/>
    <text x="418" y="24" fill="#888" font-size="8">윤정 법률사무소</text>

    <text x="540" y="24" fill="#aaa" font-size="7">서초대로 327, 로뎀빌딩 5층</text>
  </g>
</svg>
